name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate runtime config
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_PROXY_PATH: ${{ secrets.API_PROXY_PATH }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ] || [ -z "$API_PROXY_PATH" ]; then
            echo "Missing one or more required secrets: SUPABASE_URL, SUPABASE_ANON_KEY, API_PROXY_PATH"
            exit 1
          fi
          sed \
            -e "s|__SUPABASE_URL__|$SUPABASE_URL|g" \
            -e "s|__SUPABASE_ANON_KEY__|$SUPABASE_ANON_KEY|g" \
            -e "s|__API_PROXY_PATH__|$API_PROXY_PATH|g" \
            public/config.template.js > public/config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
