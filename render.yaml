services:
  - type: web
    name: nutrix-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: FRONTEND_ORIGIN
        value: https://collins-creates.github.io
      - key: GEMINI_API_KEY
        sync: false
      - key: USDA_API_KEY
        sync: false
