version: '3.8'

services:
  nutrix:
    build: .
    container_name: nutrix-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - nutrix-network
    volumes:
      - ./logs:/app/logs

  redis:
    image: redis:7-alpine
    container_name: nutrix-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - nutrix-network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  nginx:
    image: nginx:alpine
    container_name: nutrix-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - nutrix
    restart: unless-stopped
    networks:
      - nutrix-network

networks:
  nutrix-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
